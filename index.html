<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Reminder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Sans Serif', 'Arial', sans-serif;
            background: #c0c0c0;
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            width: 100%;
            max-width: 500px;
            padding: 0;
            box-shadow: inset 1px 1px #ffffff, inset -1px -1px #dfdfdf;
            font-size: 11px;
        }

        .header {
            background: linear-gradient(to right, #000080, #1084d7);
            color: #fff;
            padding: 2px 2px 2px 4px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .header h1 {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0;
            margin: 0;
            flex: 1;
        }

        .header-close {
            width: 16px;
            height: 14px;
            background: #c0c0c0;
            border: 1px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
        }

        .content {
            padding: 4px;
        }

        .form-section {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            padding: 4px;
            margin-bottom: 4px;
            box-shadow: inset 1px 1px #ffffff, inset -1px -1px #dfdfdf;
            position: relative;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 6px;
            position: relative;
        }

        label {
            display: block;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        input, textarea {
            width: 100%;
            padding: 2px 3px;
            border: 2px solid;
            border-color: #808080 #dfdfdf #dfdfdf #808080;
            background: #fff;
            color: #000;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            font-size: 11px;
            outline: none;
            box-sizing: border-box;
            -webkit-user-select: text;
            user-select: text;
            -webkit-app-region: no-drag;
        }

        input[type="date"],
        input[type="time"] {
            cursor: text;
            padding: 3px 4px;
            pointer-events: auto;
        }

        input:focus, textarea:focus {
            outline: 1px dotted #000;
            outline-offset: -2px;
            border-color: #0a246a #dfdfdf #dfdfdf #0a246a;
        }

        textarea {
            resize: vertical;
            min-height: 50px;
            font-size: 11px;
        }

        .quick-times {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }

        .quick-times button {
            flex: 1;
            padding: 3px 6px;
            font-size: 10px;
        }

        .button-group {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-bottom: 4px;
        }

        button {
            padding: 4px 12px;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            background: #c0c0c0;
            color: #000;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            box-shadow: none;
        }

        button:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        button:focus {
            outline: 1px dotted #000;
            outline-offset: -4px;
        }

        .reminders-title {
            color: #000;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            padding: 0 2px;
        }

        .reminders-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid;
            border-color: #808080 #dfdfdf #dfdfdf #808080;
            background: #fff;
            box-shadow: inset 1px 1px #dfdfdf;
        }

        .reminder-item {
            background: #fff;
            border-bottom: 1px solid #c0c0c0;
            padding: 4px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: none;
        }

        .reminder-item:hover {
            background: #000080;
            color: #fff;
        }

        .reminder-content {
            flex: 1;
            color: inherit;
            font-size: 11px;
        }

        .reminder-text {
            color: inherit;
            font-weight: normal;
            margin-bottom: 1px;
            word-break: break-word;
        }

        .reminder-date {
            color: inherit;
            font-size: 10px;
            opacity: 0.8;
        }

        .reminder-item:hover .reminder-date {
            color: #fff;
        }

        .reminder-actions {
            display: flex;
            gap: 2px;
            margin-left: 8px;
        }

        .btn-delete {
            padding: 2px 8px;
            background: #c0c0c0;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            color: #000;
            font-size: 10px;
            border: 2px solid;
            cursor: pointer;
            font-family: 'MS Sans Serif', Arial, sans-serif;
        }

        .btn-delete:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        .reminder-item:hover .btn-delete {
            background: #000080;
            color: #fff;
            border-color: #1084d7;
        }

        .empty-state {
            text-align: center;
            color: #000;
            padding: 20px 10px;
            font-size: 11px;
        }

        .empty-state-icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .success-message {
            background: #000080;
            color: #fff;
            padding: 4px;
            margin-bottom: 4px;
            text-align: center;
            font-size: 11px;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .alert-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .alert-modal.show {
            display: flex;
            pointer-events: auto;
        }

        .alert-box {
            background: #fff;
            border: 3px solid #ff0000;
            border-radius: 8px;
            padding: 20px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: alertPulse 0.6s infinite;
        }

        @keyframes alertPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .alert-box h2 {
            color: #ff0000;
            font-size: 24px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .alert-box p {
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        .alert-box button {
            padding: 10px 30px;
            font-size: 14px;
            background: #ff0000;
            color: #fff;
            border-color: #ff0000;
            margin: 5px;
        }

        .alert-box button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Reminders</h1>
        </div>

        <div class="content">
            <div class="success-message" id="successMessage">✓ Reminder added!</div>

            <div class="alert-modal" id="alertModal">
                <div class="alert-box">
                    <h2>🔔 REMINDER!</h2>
                    <p id="alertText"></p>
                    <button onclick="dismissAlert()">OK</button>
                </div>
            </div>

            <div class="form-section">
                <div class="form-group">
                    <label for="reminderDate">Date</label>
                    <input type="date" id="reminderDate" required>
                </div>

                <div class="form-group">
                    <label for="reminderTime">Time</label>
                    <input type="time" id="reminderTime" required>
                </div>

                <div class="quick-times">
                    <button type="button" onclick="setQuickTime('09:00')">9:00 AM</button>
                    <button type="button" onclick="setQuickTime('12:00')">12:00 PM</button>
                    <button type="button" onclick="setQuickTime('18:00')">6:00 PM</button>
                </div>

                <div class="form-group">
                    <label for="reminderText">What to remember?</label>
                    <textarea id="reminderText" placeholder="Enter your reminder..." required></textarea>
                </div>

                <div class="button-group">
                    <button onclick="addReminder()">Add</button>
                    <button onclick="clearForm()">Clear</button>
                    <button onclick="testAlert()">Test Alert</button>
                </div>
            </div>

            <div class="reminders-title">Your Reminders</div>
            <div class="reminders-list" id="remindersList">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <p>No reminders yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let reminders = [];

        // Set min date to today
        function setMinDateTime() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            const dateInput = document.getElementById('reminderDate');
            const timeInput = document.getElementById('reminderTime');
            
            dateInput.min = dateStr;
            dateInput.value = dateStr;
            timeInput.value = '09:00';
            
            // Add event listeners to ensure focus works
            dateInput.addEventListener('click', (e) => {
                e.preventDefault();
                dateInput.focus();
            });
            
            timeInput.addEventListener('click', (e) => {
                e.preventDefault();
                timeInput.focus();
            });
        }

        function setQuickTime(time) {
            document.getElementById('reminderTime').value = time;
        }

        async function loadReminders() {
            reminders = await window.reminderAPI.getReminders();
            renderReminders();
        }

        function renderReminders() {
            const list = document.getElementById('remindersList');
            
            if (reminders.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>No reminders yet</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = reminders
                .sort((a, b) => new Date(a.date) - new Date(b.date))
                .map(reminder => {
                    const date = new Date(reminder.date);
                    const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `
                        <div class="reminder-item">
                            <div class="reminder-content">
                                <div class="reminder-text">${escapeHtml(reminder.text)}</div>
                                <div class="reminder-date">${dateStr}</div>
                            </div>
                            <div class="reminder-actions">
                                <button class="btn-delete" onclick="deleteReminder(${reminder.id})">Delete</button>
                            </div>
                        </div>
                    `;
                })
                .join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function addReminder() {
            const dateInput = document.getElementById('reminderDate');
            const timeInput = document.getElementById('reminderTime');
            const textInput = document.getElementById('reminderText');

            if (!dateInput.value || !timeInput.value || !textInput.value.trim()) {
                alert('Please fill in all fields!');
                return;
            }

            // Combine date and time
            const dateTimeStr = dateInput.value + 'T' + timeInput.value;
            const reminder = {
                date: new Date(dateTimeStr).toISOString(),
                text: textInput.value.trim()
            };

            await window.reminderAPI.addReminder(reminder);
            clearForm();
            
            // Show success message
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);

            await loadReminders();
        }

        async function deleteReminder(id) {
            if (confirm('Delete this reminder?')) {
                await window.reminderAPI.deleteReminder(id);
                await loadReminders();
            }
        }

        function clearForm() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('reminderDate').value = dateStr;
            document.getElementById('reminderTime').value = '09:00';
            document.getElementById('reminderText').value = '';
            document.getElementById('reminderDate').focus();
        }

        function showAlert(reminderText) {
            // Show the modal
            const modal = document.getElementById('alertModal');
            const textEl = document.getElementById('alertText');
            textEl.textContent = reminderText;
            modal.classList.add('show');
            
            // Play sound and speak reminder
            playSound();
            setTimeout(() => {
                speakReminder(reminderText);
            }, 500);
            
            // Auto-dismiss after 10 seconds if not clicked
            setTimeout(() => {
                if (modal.classList.contains('show')) {
                    dismissAlert();
                }
            }, 10000);
        }

        function dismissAlert() {
            const modal = document.getElementById('alertModal');
            modal.classList.remove('show');
        }

        function playSound() {
            // Create a simple beep using Web Audio API
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                // Multiple beeps for prominence
                oscillator.frequency.value = 1000; // Hz
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
                
                // Second beep
                setTimeout(() => {
                    try {
                        const osc2 = audioContext.createOscillator();
                        const gain2 = audioContext.createGain();
                        osc2.connect(gain2);
                        gain2.connect(audioContext.destination);
                        osc2.frequency.value = 1200;
                        gain2.gain.setValueAtTime(0.5, audioContext.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                        osc2.start(audioContext.currentTime);
                        osc2.stop(audioContext.currentTime + 0.3);
                    } catch (e) {
                        console.error('Second beep error:', e);
                    }
                }, 400);
            } catch (e) {
                console.error('Audio error:', e);
            }
        }

        function speakReminder(reminderText) {
            // Use Web Speech API to speak the reminder
            if ('speechSynthesis' in window) {
                try {
                    // Cancel any previous speech
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(`Reminder: ${reminderText}`);
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 1;
                    
                    utterance.onerror = (event) => {
                        console.error('Speech synthesis error:', event.error);
                    };
                    
                    utterance.onend = () => {
                        console.log('Speech synthesis ended');
                    };
                    
                    window.speechSynthesis.speak(utterance);
                } catch (e) {
                    console.error('Speech synthesis error:', e);
                }
            } else {
                console.warn('Speech Synthesis API not available');
            }
        }

        function testAlert() {
            alert('Testing reminder alert - check volume is on!');
            showAlert('This is a test reminder');
        }

        // Listen for triggered reminders
        window.reminderAPI.onReminderTriggered((reminder) => {
            // Show in-app alert
            showAlert(reminder.text);
            loadReminders();
        });

        // Initialize
        setMinDateTime();
        loadReminders();
        
        // Reload reminders every 10 seconds to catch triggered alerts
        setInterval(loadReminders, 10000);
    </script>
</body>
</html>
